<!DOCTYPE HTML>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>原神スケジュール</title>
  <link rel="manifest" href="manifest.json">
  <style>
    /* 【デザイン】目に優しいくすみカラー設定 */
    body {
      background-color: #f4f1ea;
      color: #5d5c58;
      font-family: sans-serif;
      padding: 20px;
      margin: 0;
    }

    h1 {
      font-size: 1.4rem;
      margin-bottom: 15px;
      border-left: 5px solid #a3b8c8;
      padding-left: 15px;
      color: #4a4945;
    }

    /* 通知ボタン：許可済みならJavaScriptで非表示にします */
    #notify-btn {
      display: block;
      width: 100%;
      padding: 12px;
      margin-bottom: 20px;
      border: 1px solid #a3b8c8;
      border-radius: 12px;
      background-color: #fff;
      color: #5d5c58;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }

    .event-card {
      position: relative;
      background-color: #ffffff;
      border-radius: 18px;
      margin-bottom: 20px;
      padding: 25px 20px;
      min-height: 110px;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0,0,0,0.06);
      display: flex;
      flex-direction: column;
      justify-content: center;
      background-repeat: no-repeat;
      background-position: right center;
      background-size: contain; 
    }

    .event-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(to right, rgba(255,255,255,1) 0%, rgba(255,255,255,1) 35%, rgba(255,255,255,0.7) 65%, rgba(255,255,255,0) 98%);
      z-index: 1;
    }

    .event-info { position: relative; z-index: 2; max-width: 65%; }
    .event-title { font-weight: bold; font-size: 1.1rem; margin-bottom: 8px; color: #333; display: block; }
    .event-time { font-size: 0.85rem; color: #777; font-variant-numeric: tabular-nums; }

    .status-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
      margin-bottom: 8px;
      font-weight: bold;
      color: #fff;
    }
    .status-upcoming { background-color: #b2c9ab; }
    .status-active { background-color: #a3b8c8; }
    .status-ending { background-color: #d9b5b2; }
    
    .loading { text-align: center; padding: 50px; color: #888; font-size: 0.9rem; }
  </style>
</head>
<body>

  <h1>原神スケジュール</h1>
  
  <button id="notify-btn">🔔 通知をオンにする</button>

  <div id="app">
    <div class="loading">スプレッドシートを読み込み中...</div>
  </div>

<script>
  if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

    const SHEET_ID = '1KXIFT2144f_9lihSxHEO_hzNiMEmgKyrNaM24WwBMyQ'; 
    const SHEET_NAME = 'イベント一覧'; 

    let lastNotifiedEvents = new Set();

    if (Notification.permission === 'granted') {
      document.getElementById('notify-btn').style.display = 'none';
    }

    document.getElementById('notify-btn').addEventListener('click', () => {
      Notification.requestPermission().then(permission => {
        if (permission === 'granted') {
          alert('通知をオンにしました！');
          document.getElementById('notify-btn').style.display = 'none';
        }
      });
    });

    async function fetchAndRender() {
      const API_URL = `https://opensheet.elk.sh/${SHEET_ID}/${SHEET_NAME}`;

      try {
        const response = await fetch(API_URL);
        if (!response.ok) throw new Error('シートの読み込みに失敗しました');
        const rawData = await response.json();

        const now = new Date();

        const eventList = rawData.filter(item => item.start && item.end).map(item => {
          const s = new Date(item.start);
          const e = new Date(item.end);
          // 日付が正しく読み取れない（Invalid Date）場合は除外
          if (isNaN(s.getTime()) || isNaN(e.getTime())) return null;

          return {
            name: item.name || "名称未設定",
            start: s,
            end: e,
            bg: item.bg || ""
          };
        })
        .filter(ev => ev !== null && ev.end > now)
        .sort((a, b) => a.end - b.end);

        renderApp(eventList);
        checkNotifications(eventList);

      } catch (error) {
        console.error(error);
        // エラー内容を少し詳しく表示するように変更
        document.getElementById("app").innerHTML = `<div class="loading">取得エラー: ${error.message}<br>スプレッドシートの日付形式（2026/03/31 19:00:00）を確認してください。</div>`;
      }
    }

    function checkNotifications(eventList) {
      if (Notification.permission !== "granted") return;

      const now = new Date();
      eventList.forEach(ev => {
        const diff = ev.start.getTime() - now.getTime();
        
        // 【重要】開始5分前(300000ms)から開始1分後(-60000ms)の間
        if (diff < 300000 && diff > -60000) {
          if (!lastNotifiedEvents.has(ev.name)) {
            try {
              new Notification("原神イベント開始！", {
                body: `${ev.name} が始まりました！`,
                requireInteraction: true // 通知を勝手に消さない設定
              });
              lastNotifiedEvents.add(ev.name);
            } catch (e) {
              console.error("通知の送信に失敗:", e);
            }
          }
        }
      });
    }

    function renderApp(eventList) {
      const now = new Date();
      let html = "";

      if (eventList.length === 0) {
        html = '<div class="loading">現在予定されているイベントはありません。</div>';
      }

      eventList.forEach(ev => {
        let statusClass, statusLabel, timeText;
        const diffToStart = ev.start.getTime() - now.getTime();
        const diffToEnd = ev.end.getTime() - now.getTime();

        if (diffToStart > 0) {
          statusClass = "status-upcoming";
          statusLabel = "開始まで";
          timeText = calculateTime(diffToStart);
        } else {
          statusClass = (diffToEnd < 24 * 60 * 60 * 1000) ? "status-ending" : "status-active";
          statusLabel = "進行中（終了まで）";
          timeText = calculateTime(Math.max(0, diffToEnd));
        }

        html += `
          <div class="event-card" style="background-image: url('${ev.bg}')">
            <div class="event-info">
              <span class="status-badge ${statusClass}">${statusLabel}</span>
              <span class="event-title">${ev.name}</span>
              <span class="event-time">残り：${timeText}</span>
            </div>
          </div>
        `;
      });

      document.getElementById("app").innerHTML = html;
    }

    function calculateTime(ms) {
      if (ms <= 0) return "間もなく終了";
      const days = Math.floor(ms / (1000 * 60 * 60 * 24));
      const hours = Math.floor((ms % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const mins = Math.floor((ms % (1000 * 60 * 60)) / (1000 * 60));
      return `${days}日 ${hours}時間 ${mins}分`;
    }

    fetchAndRender();
    setInterval(fetchAndRender, 30000); // 30秒ごとに更新して精度アップ
  </script>

</body>
</html>
